services:
  - type: web
    name: industrial-ai-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: REDIS_URL
        fromService:
          name: industrial-ai-cache-sg
          type: keyvalue
          property: connectionString
      - key: POSTGRES_DSN
        fromDatabase:
          name: industrial-ai-db
          property: connectionString
      - key: RUL_ALERT_THRESHOLD
        value: "0.30"

  - type: web
    name: industrial-ai-dashboard
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerCommand: streamlit run dashboard.py --server.address 0.0.0.0 --server.port $PORT
    autoDeployTrigger: checksPass
    envVars:
      - key: API_URL
        # Free Render web services cannot receive private-network traffic.
        # The dashboard therefore calls the API's stable public URL.
        value: https://industrial-ai-api-zo8e.onrender.com
      - key: DASHBOARD_REFRESH_MS
        value: "3000"

  - type: keyvalue
    name: industrial-ai-cache-sg
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: industrial-ai-db
    plan: free
    region: singapore
    databaseName: industrial
    user: industrial
