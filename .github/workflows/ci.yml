name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install quality and lightweight test dependencies
        run: python -m pip install --upgrade pip black flake8 pytest numpy pillow
      - name: Black format check
        run: black --check outputs tests
      - name: Flake8 lint
        run: flake8 outputs tests --max-line-length=120 --extend-ignore=E203,W503
      - name: Unit tests
        run: pytest -q
