services:
  api:
    build: .
    environment:
      REDIS_URL: redis://redis:6379/0
      RUL_ALERT_THRESHOLD: "0.30"
      # Mount or bake trained .pt files, then uncomment these paths.
      # TCN_CHECKPOINT: /models/tcn.pt
      # VISION_CHECKPOINT: /models/vision.pt
      POSTGRES_DSN: postgresql://industrial:industrial@postgres:5432/industrial
      MINIO_ENDPOINT: minio:9000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run dashboard.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_URL: http://api:8000
      DASHBOARD_REFRESH_MS: "3000"
    depends_on:
      - api
    ports:
      - "8501:8501"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: industrial
      POSTGRES_USER: industrial
      POSTGRES_PASSWORD: industrial
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U industrial -d industrial"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  minio_data:
